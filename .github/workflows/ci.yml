# IOPtics CI — Tier-1 (data-independent) tests only.
#
# Per the design doc (§"Testing & CI"): CI is deliberately light. It installs
# the dependencies (including the two siblings ocpy/bing from the tip of their
# `main` branches, pinned in requirements.txt) and runs `pytest -q`. The
# data-dependent (Tier-2) tests skip automatically because no $OS_COLOR data
# tree is mounted on the runner, so the suite stays green and fast.
#
# CI does NOT run sweeps, build reports, or publish the readthedocs site
# (reports are generated on demand by a runs/.../build_vN.py). It is advisory:
# pass/fail reflects `pytest -q` only — no coverage floor and no fail-on-warning.

name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tier-1 tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # the declared minimum (setup.py: >=3.12)
          cache: pip

      - name: Install dependencies (requirements.txt incl. ocpy/bing @ main)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Smoke check (import ioptics)
        run: python -c "import ioptics; print('ioptics', ioptics.__version__)"

      - name: Run Tier-1 tests
        run: pytest -q
